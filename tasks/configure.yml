---
- name: Set acng_conf_combined
  set_fact:
    acng_config_combined: "{{ acng_config | combine(acng_config_default) }}"

- name: Configure acng.conf
  lineinfile:
    dest: /etc/apt-cacher-ng/acng.conf
    regexp: "^{{ item.key }}: "
    line: "{{ item.key }}: {{ item.value['value'] | default() }}"
    state: "{{ item.value['ensure'] | default('present') }}"
  loop: "{{ lookup('dict', acng_config_combined) }}"
  notify:
    - "restart {{ acng_service_name }}"

- name: configure security.conf
  lineinfile:
    dest: /etc/apt-cacher-ng/security.conf
    regexp: "^AdminAuth:"
    line: "AdminAuth: {{ acng_admin_name }}:{{ acng_admin_password }}"
    state: "{{ (acng_admin_state == 'present' and acng_admin_name is defined) | ternary('present', 'absent')  }}"
  notify:
    - "restart {{ acng_service_name }}"
